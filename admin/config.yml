backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: 'ar'

collections:
  - name: "articles"
    label: "المقالات"
    label_singular: "مقال"
    folder: "articles"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "العنوان", name: "title", widget: "string"}
      - {label: "التاريخ", name: "date", widget: "datetime"}
      - {label: "الكاتب", name: "author", widget: "string", default: "فريق التحرير"}
      - {label: "التصنيف", name: "category", widget: "select", options: ["بيتكوين", "إيثيريوم", "ديفاي", "NFT", "ذكاء اصطناعي", "تنظيم", "تحليل", "أخبار عامة"]}
      - {label: "الصورة الرئيسية", name: "thumbnail", widget: "image", required: false}
      - {label: "ملخص قصير", name: "summary", widget: "text"}
      - {label: "المحتوى", name: "body", widget: "markdown"}
